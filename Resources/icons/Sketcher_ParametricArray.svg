<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" version="1.1" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <g>
    <!-- Grid of circles representing array -->
    <!-- Row 1 -->
    <circle cx="14" cy="14" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    <circle cx="32" cy="14" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    <circle cx="50" cy="14" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    
    <!-- Row 2 -->
    <circle cx="14" cy="32" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    <circle cx="32" cy="32" r="8" fill="#50c878" stroke="#3a9b5c" stroke-width="2.5"/>
    <circle cx="50" cy="32" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    
    <!-- Row 3 -->
    <circle cx="14" cy="50" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    <circle cx="32" cy="50" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    <circle cx="50" cy="50" r="8" fill="#4a90e2" stroke="#2e5c8a" stroke-width="2"/>
    
    <!-- Base marker on center (origin indicator) -->
    <circle cx="32" cy="32" r="3" fill="#ffa500" stroke="#cc8400" stroke-width="1.5"/>
    
    <!-- Dimension arrows showing parametric nature -->
    <g stroke="#ff6b6b" stroke-width="1.5" fill="none">
      <!-- Horizontal spacing arrow -->
      <line x1="14" y1="60" x2="32" y2="60" marker-end="url(#arrowhead)"/>
      <line x1="32" y1="60" x2="14" y2="60" marker-start="url(#arrowhead)"/>
    </g>
    
    <!-- Arrow marker definition -->
    <defs>
      <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <polygon points="0 0, 6 3, 0 6" fill="#ff6b6b"/>
      </marker>
    </defs>
  </g>
</svg>
